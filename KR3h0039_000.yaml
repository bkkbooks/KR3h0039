body:
  text: 圗畫考目録卷之一叙古述原興廢規鑒圗名師傳卷之二工用筆法氣韻設色模搨卷之三紀藝佛道人物傳真宫室卷之四紀藝山水卷之五紀藝竹木花鳥蔬果龍魚畜獸卷之六名譜上古中古近古卷之七鑒藏辨謬品價印記裝禙藏玩
