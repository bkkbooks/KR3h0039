front:
  text: 進圗畫考序臣聞古者伏羲氏之王天下也則河圖以畫八卦羲皇蒼頡觀鳥迹物象以成字而圖書出焉而二者同體未分也其後畫衣冠以懸魏闕使民不犯畫山龍華蟲藻米于衣使民知上下之衣冠畫魑魅怪物鑄之鼎而識之使民入山林不逢不若三歲一遣使者巡行四方以同其書之文而圗之始分各備其制矣此皆聖帝明王治天下大經大法而不可忽也至若圗形以求腎則殷之髙宗也圗功臣于雲臺麒麟凌烟之閣則漢之光宣唐之太宗也籀斯之篆程蔡之隸以及鍾王等書皆精造極詣之妙而時君功德所賴以傳之萬丗而不磨者也太宗英明文武于是事者猶所注意而其臣之能又皆足以附記自見故唐世書畫之至今稱焉雖曰一藝之微其實至道之所寓君臣之間又相假此以存勸戒故君賜以周公負成王之圗而寄屬輔之意明臣進君以心正筆正之說而端本清源之義著古今所傳為用斯大不可誣也欽惟聖朝道邁千古藝文盛作髙出漢唐特設博士以鑒書畫而謬庸龎雜之說無所容其間萬機之暇遊神餋性以贊緝熙之學而成無為之化蓋有取于斯也臣不揣愚陋昔備藝文生嘗著法書考今復博采傳記芟繁托要撰為圗畫考一通凡七卷繕寫裝潢謹上進聞臣不勝惶懼激切屏營之至臣盛熙明謹序
