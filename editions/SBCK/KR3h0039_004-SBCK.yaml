front:
  text: 圗畫攷卷之四
  hash: sha256:7358abb019696c176a0b46c5fec222886902b6b64fd755d409189892a04b5412
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0039_SBCK_004-1a}
body:
  text: 紀藝山水附樹石張彦遠云魏晉以降名跡在人間者皆見之矣其畫山水則群峰之􅀔若鈿飾犀􅌨或水不容泛或人大扵山率皆附以樹石映帶其地列植之狀則若伸臂布指詳古人之意􅌹在顯其所長而不守於俗變也唐初二閆擅美匠學楊展精意宫觀漸變所附尚猶狀石則務於雕透如氷澌斧刃繪樹則刷脉鏤葉多栖梧菀栁功倍愈拙不勝其色吳道玄者天付勁毫幼抱神奥往往於佛寺畫壁縱以恠石崩灘若可捫酌又於蜀道寫貎山水由是山水之變始扵吴成於二李樹石之狀玅於韋鶠窮於張通通能用紫毫秃鋒以掌摸色中遺巧􅎖外若渾成又若王右丞之重深楊僕射之奇贍朱審之濃秀王宰之巧宻劉商之取象其餘作者非一皆不過之若後有侯莫陳厦沙門道芬精緻稠沓皆一時之秀也郭若虚云林木有樛枝挺榦屈節皴皮紐裂多端分敷萬狀作怒龍驚虺之􅀔聳凌雲翳日之姿宜須崖岸豐隆方稱􅌉根老壯也畫山石者多作礬頭亦為陵面落筆便見堅重之性皴淡則生窊凸之􅄱每留素以成雲或借地而為雪其破墨之功尤為難也米元章云李成山水秀潤不凡松木勁挺枝葉欝然有隂荆楚小木無冗筆不作龍蛇鬼神之狀今世所收大圗猶如顔栁書藥牌形貌似爾無自然皆凡俗林木怒張松榦枯瘦多節小木如柴無生意成身為光祿丞子孫皆顯宦非凡工所比董源平淡天真多唐無此品在畢宏上近世神品格髙無與比也峯巒出没雲霧顯晦不装巧趣皆得天真嵐色欝蒼枝榦勁挺咸有生意溪橋漁浦洲渚掩映一片江南景也闗仝人物俗石木出扵畢宏有枝無榦張友正家收古柏一株枝枝如龍蛇糾結甚異石亦皺澀不凡題爲韋侯所作江南陳常以飛白筆作樹石有清逸意董源峯頂不工絶澗危徑幽扃多真意荆浩善爲雲中山頂四面峻厚訣云畫山水貴乎石光而潤水淡而明泉石分乎髙下山水辨乎逺近野逕縈紆雲烟出没千里江山盡歸木不竹木則貴􅀔傲烟霞氣凌霜雪恠節林列而直幹森空虬枝蟠屈倒纒􅀛蛇偃蓋低欹畢宏作松石落筆縱横皆變易前法不為物滯枝得生意為多蓋畫家謂畫松當如夜义臂鸛鵲啄而深􅉾淺凸又所以為石焉而宏一切變通郭熙云春山澹冶而如笑夏山蒼翠而如滴秋山明凈而如粧冬山惨淡而如睡大山堂堂為衆山之主長松亭亭為衆木之表又論曰於幽處使可居於平處使可行天造地設處使可驚嶄絶奇險處使可畏此真善畵者也
