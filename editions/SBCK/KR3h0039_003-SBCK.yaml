front:
  text: 圗畫攷卷之三
  hash: sha256:b8065f2704cd14795c849715198a3301c39a353f6cb11f62cc82c75579fb49bc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0039_SBCK_003-1a}
body:
  text: 紀藝佛道北齊曹仲達者本曹國人最推工畫梵像是為曹吳謂唐吴道子也吴之筆其􅀔圜轉而衣服飄舉曹之筆其體稠疊而衣服緊窄故後輩曰吴帶當風曹衣出水又按蜀僧仁顯廣畫新集言曹曰昔笁乾康僧㑹者初入吴設像行道時曹不興見西國佛畫儀範寫之故天下盛傳曹也又云吴者􅁸扵宋之吳暕之作故號吴也且謝赫云不興之跡代不復見惟秘閣一龍頭而已觀其風􅇧擅名不虚吳暕之説聲微蹟曖世不復傳至如仲達見北齊之朝距唐不逺道子顯開元之後繪像仍存証近代之師承合當時之體範况唐室以上未立曹吳豈顯釋寡要之談亂愛賔不刋之論推時驗迹無愧斯言也雕塑鑄像亦本曹吳人物見聞志云畫人物者必分貴賤氣貌朝代衣冠釋門則有善巧方便之顔道像必具脩真度世之範帝皇當崇上聖天日之表外夷􅀿得慕華欽順之情儒賢即見忠信禮義之風武士固多勇悍英烈之貌隱逸俄識肥遁髙世之節貴戚盖尚紛華侈靡之容帝釋須明威福嚴重之儀鬼神乃作醜䰩馳趡之狀士女宜賦秀色婑媠之態田家自有醇甿朴野之真恭驁愉惨又在其間矣畫衣紋林石用筆全􅀋扵書畫衣紋有重大而條暢者有縝細而勁健者勾綽縱掣理無妄下以狀髙側深斜卷摺飄舉之􅀔宣和譜云周昉婦女多為豐厚態度意穠態遠又云李伯時工人物能分别狀貌使人望而知其廊館䑓閣山林草野閭閻臧􅀗䑓輿皂隸至扵動作態度屈伸俯仰小大美惡與夫東西南北人才分㸃畫尊卑貴賤咸有區别非若世俗畫工渾為一律貴賤姸醜止以肥紅瘦黒分之大抵以立意為先緣􅎖次之也傳真即子儀寫婿真事能寫正面容者惟牟谷衣冠自古衣冠之制荐有變更指事繪形必分時代衮冕法服三禮備存物狀實繁難可得而載也漢魏以前始戴幅巾晉宋之世方用􅇈䍦後周以三尺皂絹向後幞髮名折上巾通謂之幞頭武帝裁成四脚隋朝惟貴臣服進徳至則天朝以絲葛為幞頭巾子以賜百官開元間始易以羅又别賜供奉官及内官員郎宫様巾子至唐末方用漆紗裹之乃今幞頭也三代之際皆衣襕衫秦始皇時以紫緋緑袍為三等品服庶人以白國語云􅂁者朝也古公卿上服也至周武帝時下加襴唐髙宗朝給五品以上隨身魚又􅃙品官紫服金玉帶深淺緋服並金帶深淺緑服並銀帶庶人服黄銅鐵帶一品以下文官帶手巾筭袋刀子礪石武官亦然睿宗朝制武官五品以上帶七事跕蹀佩刀刀子磨石契苾真􅎪厥針筒大石袋也開元初復罷之晉處士馮翼衣布大袖周縁以皂下加襴前繫二長帶随唐朝野服之謂之馮翼之衣今呼為直裰禮記孔子衣逢掖之衣又梁志有袴褶以從戎事三代以前人皆跣足三代以後始服木屐伊尹以草為之名曰履秦時用絲革靴本胡服趙􅂕王好之制有司衣袍者宜穿皂靴唐代宗令宫人侍左右者穿紅錦靿靴凡在􅀴營所􅄀詳辨米芾云蜀范瓊畫梁武帝白冠衣褐晉尚白宋齊梁陳習見不同各以所尚色皆白帽顧愷之畫維摩猶白首周木德冕皆尚青仲尼曰吾殷人也生于宋故服章甫之冠此殷制殷水徳故尚玄玄端章甫皆黒色也封二王後各行其正朔服其文物也漢火徳用赤幘舜土徳尚黄故服黄冠宜觸􅀋而長之乃不凡唐人軟裹盖禮樂闕則士習賤服以不違俗為美余初惑之耆舊言唐􅀄士子皆頂鹿皮冠弁遺制也更無頭巾掠子必帶箆所以裹帽則必用箆子約髮入幞頭巾子中其後有絲絹作掠子掠􅁸髪頂帽岀入不敢使尊者見又其後方用紫羅為無頂頭巾謂之額子猶不敢習庶人頭巾其後舉人始以紫紗羅為長頂頭巾稍作幅巾逍遥巾額子則為不敬衣用裹肚勒帛則為是近又以半臂軍服披甲上不帶者謂之背子以為重禮無則為無禮不知今之士服大帶拖紳乃為禮不帶左袵皆夷服漢制從者巾與殷母追同今頭巾若不作頂而四帶兩小者在髪而差大者垂則此制也徐州之民去巾下必有鹿楮皮冠此古俗所著良足美也又唐初畫舉人必鹿皮冠縫掖大袖黄衣短至􅂰長白裳也蕭翼御史至越見辯才云著黄衣大袖如山東舉子用證未軟裹曰襴也李太白像鹿皮冠大袖黄袍服亦奇制也宫室張彦逺云吳道子畫植柱構梁不假界筆直尺郭若虚云畫屋木者折筭無虧筆畫匀壯深逺透空一去百斜如隋唐五代以前洎郭忠恕王士元之流畫樓閣多見四角其斗栱逐鋪作為之向背分明不失繩墨今之畫者多用直尺一就界畫分成斗栱筆跡䌓雜無壯麗閒雅之意又云設或有未識漢殿吴殿梁柱斗栱义手替木熟柱駞峯方莖額道抱間昻頭琥珀枋􅀛頭虎坐飛簷撲水膞風化廢垂魚惹草當鈎曲脊之􅀋憑何以畫屋木也畫者尚未能精究況觀者乎
