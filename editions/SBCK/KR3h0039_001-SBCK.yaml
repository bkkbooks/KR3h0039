front:
  text: 圗畫攷卷之一
  hash: sha256:b5d692bc1e6c85b9c0bd2e81d9b4b6e05e667e55786a93b9ca16f2e95da870e7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0039_SBCK_001-1a}
body:
  text: 叙古述原爾雅云畫形也廣雅云畫􅀋也説文云畫畛也象田畛畔所以畫也釋名云畫挂也名畫記云古先聖王受命膺籙則有􅀛字效靈龍圗呈寳自庖犧氏發於滎河中典籍圗畫萌矣軒轅氏得扵温洛中史皇蒼頡狀焉奎有芒角下主辭章頡有四目仰觀垂象因儷鳥􅀛之迹遂定書字之形是時書畫同體而未分象制肇創而猶畧無以􅀓其意故有書無以見其形故有畫天地聖人之意也按字之六體内有鳥書在幡信上書端象鳥首者畫之流也顔光祿云圗載之意有三一曰圗理卦象是也二曰圗識字學是也三曰圗形繪畫是也又周官教國子以六書其三曰象形則畫之意也見聞志云黃帝製有章數皆畫本也伏羲畫八卦當為畫字今之古文禽魚皆有象形之體即畫之法也興廢名畫記云漢武創置秘閣以聚圗書漢明雅好丹青别開畫室又創鴻都學以集奇藝及董卓之亂山陽西遷圗畫縑帛軍人皆取為帷囊所收而西七十餘乗遇􅀨道艱半皆遺棄魏晉故多藏蓄胡冦入洛一時焚燒宋齊梁陳之君雅有好尚晉遭劉曜多所毁散桓玄性貪好奇天下法書名畫必使歸已及玄簒逆晉府真迹玄盡得之玄敗宋髙祖先使􅆇喜入宫載焉南齊髙帝科其尤精者不以逺近為次但以優劣為差自陸探微至范惟賢四十二人為四十二等二十七帙三百四十八卷政餘披玩梁武帝尤加寳異仍更搜葺元帝尤喜丹青珍奇充仭内府侯景之亂太子綱數夢秦皇更欲焚天下書既而圖書數百函果為景所焚也及景平所有畫皆載入江陵為西魏􅀅于謹所䧟元帝􅀅降乃聚名畫法書及典籍二十四萬卷焚之于謹等於煨燼中收其書畫四千餘軸歸長安陳天嘉中陳主肆意搜求所得不少隋平陳命裴矩髙頻收得八百餘卷隋帝扵東京觀文殿後􅁸二臺東曰妙楷藏自古法書西曰寳蹟收自古名畫煬帝東幸􅀭州盡􅀅持隨駕中道舡覆太半淪棄煬帝崩宇文化及得之及至聊城為竇建徳所取留東都者為王世充所取唐武徳五年尅平僭逆擒二偽主兩都秘藏命司農少卿宋遵貴載之以船泝河􅀅致京經砥柱忽遭漂没所存十無一二唐初内庫只有三百卷太宗更扵人間購求歸之如雲故内府圗書謂之大備或進獻得官或搜訪􅀗賞又畜積之家自號圗書之府天后朝使工人鋭意模寫内府圗書一加裝背真者多歸張易之易之誅後為薛稷所得薛没後為􅄮王範所得後皆歸天府禄山之亂耗散頗多肅宗不甚保持頒之貴戚貴戚不好鬻扵不肖之手遂又多歸好事之家徳宗艱難之後又經失散甚可痛也自古兵火亟焚江波屢漂時君不尚失墜彌多彦遠自髙祖博古多藝窮精蓄奇至憲宗時張氏書畫盡獻内府䂓鑒陸士衡云丹青之興比雅頌之述作美大業之馨香宣物莫大扵言存形莫善扵畫曹植云觀畫者見三皇五帝莫不仰戴見三季異主莫不悲惋見簒臣賊子莫不切齒見髙節妙士莫不忘食見忠臣死難莫不抗節見放臣逐子莫不歎息見淫夫妬婦莫不側目見令妃順后莫不嘉貴米元章云古人畫圗無非勸戒今人撰明皇􅄑興慶圗無非奢麗吴王避暑圗重樓平閣徒動人侈心畫譜云李公麟作畫贈人往往著勸戒扵其間與君平賣卜諭人以禍福使之為善同意圗名張彦逺云古之秘畫珍圗名隨意立固多散逸人間不得見之今粗舉其要凡九十有七也龍魚河圗六甲隠形圗五帝鉤命訣圗孝經雌雄圗遁甲開山圗甘泉宫圗漢麟閣圗鴻都門圗西王母益地圗南都賦圗雲漢圗黄帝明堂圗五嶽真形圗韓詩圗論語圗􅃖尤王子兵法營陣圗魯般攻戰器械圗伍員水戰圗吴孫子兵法雲氣圗五星八卦二十八宿圗十二星宫圗日月交㑹九道圗分野璿璣圗望氣圗河圗詩緯圗春秋圗孝經䜟圗浸譚泥圗八卦八風十二時二十八宿音律圗周公成壞吉㐫圗妖恠圗相宅園地圗黄帝樊薛許氏相圗隂陽宅相圗馬像圗三王相鷹圗療馬百病圗老子黄庭圗大蒐神芝圗黄帝昇龍圗山海經圗大史公漢書圗大荒經圗河圗括地象圗天地郊社圗諸鹵簿圗搜神記圗百國人圗地形圗地形方丈圗明帝大學圗列仙傳圗古聖賢帝王圗古瑞應圗魏帝所撰雜畫圗魏順應圗大駕鹵簿圗孫子八陣圗大一三宫用兵成圗渾天宣夜圗日月交㑹圗章賢十二時雲雨氣圗十二屬神圗神農本草例圗周禮圗周室王城宗廟圗江圗吳孫子牝牡八變陣圗黄石公五星圗玄圗占雲氣圗二十八宿分野圗風角五音圗三禮圗爾雅圗忠孝圗漢明畫室圗益州學堂圗魯廟孔子弟子圗傳國璽圗洛陽宫圗區宇圗職貢圗中天竺國圗祥瑞圗符瑞圗白澤圗古今藝術圗靈秀本草圗易狀圗靈命本圗辯靈命圗見聞志云古之祕畫珍圗名隨意立典範則有春秋毛詩論語孝經爾雅等圗其次則有講學圗孔子問禮圗明堂朝㑹圗封禪圗雪宫圗觀徳則有帝舜娥皇女英圗夏禹治水圗列女仁智圗勲賢圗忠鯁則有辛毗引􅅂圗陳元達鎖諫圗朱雲折檻圗髙節則有祖二疏圗木雁圗屈原漁父圗巢由洗耳圗壯氣則有卞荘刺虎圗師子擊象圗漢武射蛟圗寫景則有輕舟迅邁圗穆天子宴瑶池圗金谷園圗雪霽望五老峯圗靡麗則有南朝貴戚圗丁貴人彈曲項琵琶圗楊妃架雪衣女亂雙陸局圗風俗則有剡中溪谷村墟圗永嘉屋邑圗長安車馬人物圗堯民鼔腹圗以上畫圗雖不能盡見其實迹前人載之甚詳但愛其佳名聊取一二録之師傳名畫記云若不知師資傳授則未可議乎畫晉明帝師扵王廙衛協師扵曹不興顧愷之張墨荀朂師扵衛協史道碩王微師扵荀朂衛協戴逵師扵范宣逵子㪍㪍弟顒師扵父宋陸探微師扵顧愷之探微子綏弘肅并師扵父顧寳光袁倩師扵陸倩子質師扵父顧駿之師扵張墨張則師扵吳暕吳暕師扵江僧寳劉胤祖師扵晉明帝胤祖弟紹祖子璞並師扵胤祖南齊姚曇度子釋惠覺師扵父蘧道敏師扵章繼伯道敏甥僧珍師扵道敏沈標師扵謝赫周曇硏師於曹仲達毛惠逺師扵顧惠遠梁袁昻師扵謝張鄭張憎繇子善果儒童並師扵父觧倩師扵聶松蘧道敏焦寳願師扵張謝江僧寳師扵袁陸及戴田僧亮師扵董展曹仲逹師扵袁隋鄭法士師於張法士弟法輪子徳文並師於法士孫尚子師於顧陸張鄭陳善見師於楊鄭李雅師於張僧繇王仲舒師扵孫尚子又云各有師資遞相倣效或自開户牗或未及或過之似􅀋之間精粗有别田僧亮楊子華楊契丹鄭法士董伯仁展子虔孫子䖍閻立徳閻立本並祖述顧陸僧繇所言勝者以觸􅀋皆能而就中有所偏勝
