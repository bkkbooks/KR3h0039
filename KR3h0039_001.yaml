front:
  text: 圗畫考卷之一
  hash: sha256:b3e8001f53eeaafff9e7c9a9fd00dde8d771b179e1d276d1c5de733148614fe4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0039_SBCK_001-1a}
body:
  text: 敘古述原爾雅云畫形也廣雅云畫類也説文云畫畛也象田畛畔所以畫也釋名云畫挂也名畫記云古先聖王受命膺籙則有龜字效靈龍圗呈寶自庖犧氏發於滎河中典籍圗畫萌矣軒轅氏得于溫洛中史皇蒼頡狀焉奎有芒角下主辭章頡有四目仰觀垂象因儷鳥龜之迹遂定書字之形是時書畫同體而未分象制肇創而猶略無以傳其意故有書無以見其形故有畫天地聖人之意也按字之六體內有鳥書在幡信上書端象鳥首者畫之流也顔光祿云圗載之意有三一曰圗理卦象是也二曰圗識字學是也三曰圗形繪畫是也又周官教國子以六書其三曰象形則畫之意也見聞志云黃帝製有章數皆畫本也伏羲畫八卦當為畫字今之古文禽魚皆有象形之體即畫之法也興廢名畫記云漢武創置祕閣以聚圗書漢明雅好丹青别開畫室又創鴻都學以集奇藝及董卓之亂山陽西遷圗畫縑帛軍人皆取為帷囊所收而西七十餘乘遇雨道艱半皆遺棄魏晉故多藏蓄胡冦入洛一時焚燒宋齊梁陳之君雅有好尚晉遭劉曜多所毁散桓玄性貪好奇天下法書名畫必使歸已及玄篡逆晉府真迹玄盡得之玄敗宋髙祖先使臧喜入宫載焉南齊髙帝科其尤精者不以逺近為次但以優劣為差自陸探微至范惟賢四十二人為四十二等二十七帙三百四十八卷政餘披玩梁武帝尤加寶異仍更搜葺元帝尤喜丹青珍奇充仭內府侯景之亂太子綱數夢秦皇更欲焚天下書既而圖書數百函果為景所焚也及景平所有畫皆載入江陵為西魏將于謹所陷元帝將降乃聚名畫法書及典籍二十四萬卷焚之于謹等於煨燼中收其書畫四千餘軸歸長安陳天嘉中陳主肆意搜求所得不少隋平陳命裴矩髙頻收得八百餘卷隋帝于東京觀文殿後起二臺東曰妙楷藏自古法書西曰寶迹收自古名畫煬帝東幸揚州盡將持隨駕中道船覆太半淪棄煬帝崩宇文化及得之及至聊城為竇建德所取留東都者為王世充所取唐武德五年尅平僭逆擒二偽主兩都祕藏命司農少卿宋遵貴載之以船泝河將致京經砥柱忽遭漂沒所存十無一二唐初內庫只有三百卷太宗更于人間購求歸之如雲故內府圗書謂之大備或進獻得官或搜訪獲賞又畜積之家自號圗書之府天后朝使工人鋭意模寫內府圗書一加裝背真者多歸張易之易之誅後為薛稷所得薛沒後為𡵨王範所得後皆歸天府祿山之亂耗散頗多肅宗不甚保持頒之貴戚貴戚不好鬻于不肖之手遂又多歸好事之家德宗艱難之後又經失散甚可痛也自古兵火亟焚江波屢漂時君不尚失墜彌多彥遠自髙祖博古多藝窮精蓄奇至憲宗時張氏書畫盡獻內府規鑒陸士衡云丹青之興比雅頌之述作美大業之馨香宣物莫大于言存形莫善于畫曹植云觀畫者見三皇五帝莫不仰戴見三季異主莫不悲惋見篡臣賊子莫不切齒見髙節妙士莫不忘食見忠臣死難莫不抗節見放臣逐子莫不歎息見淫夫妬婦莫不側目見令妃順后莫不嘉貴米元章云古人畫圗無非勸戒今人撰明皇幸興慶圗無非奢麗吳王避暑圗重樓平閣徒動人侈心畫譜云李公麟作畫贈人往往著勸戒于其間與君平賣卜諭人以禍福使之為善同意圗名張彥逺云古之祕畫珍圗名隨意立固多散逸人間不得見之今粗舉其要凡九十有七也龍魚河圗六甲隱形圗五帝鉤命訣圗孝經雌雄圗遁甲開山圗甘泉宫圗漢麟閣圗鴻都門圗西王母益地圗南都賦圗雲漢圗黃帝明堂圗五嶽真形圗韓詩圗論語圗蚩尤王子兵法營陳圗魯般攻戰器械圗伍員水戰圗吳孫子兵法雲氣圗五星八卦二十八宿圗十二星宫圗日月交會九道圗分野璿璣圗望氣圗河圗詩緯圗春秋圗孝經讖圗浸談泥圗八卦八風十二時二十八宿音律圗周公成壞吉凶圗妖怪圗相宅園地圗黃帝樊薛許氏相圗隂陽宅相圗馬像圗三王相鷹圗療馬百病圗老子黃庭圗大搜神芝圗黃帝升龍圗山海經圗大史公漢書圗大荒經圗河圗括地象圗天地郊社圗諸鹵簿圗搜神記圗百國人圗地形圗地形方丈圗明帝大學圗列仙傳圗古聖賢帝王圗古瑞應圗魏帝所撰雜畫圗魏順應圗大駕鹵簿圗孫子八陳圗大一三宫用兵成圗渾天宣夜圗日月交會圗章賢十二時雲雨氣圗十二屬神圗神農本草例圗周禮圗周室王城宗廟圗江圗吳孫子牝牡八變陳圗黃石公五星圗玄圗占雲氣圗二十八宿分野圗風角五音圗三禮圗爾雅圗忠孝圗漢明畫室圗益州學堂圗魯廟孔子弟子圗傳國璽圗洛陽宫圗區宇圗職貢圗中天竺國圗祥瑞圗符瑞圗白澤圗古今藝術圗靈秀本草圗易狀圗靈命本圗辨靈命圗見聞志云古之祕畫珍圗名隨意立典範則有春秋毛詩論語孝經爾雅等圗其次則有講學圗孔子問禮圗明堂朝會圗封禪圗雪宫圗觀德則有帝舜娥皇女英圗夏禹治水圗列女仁智圗勳賢圗忠鯁則有辛毗引𥚑圗陳元達鎖諫圗朱雲折檻圗髙節則有祖二疏圗木雁圗屈原漁父圗巢由洗耳圗壯氣則有卞莊刺虎圗師子擊象圗漢武射蛟圗寫景則有輕舟迅邁圗穆天子宴瑶池圗金谷園圗雪霽望五老峯圗靡麗則有南朝貴戚圗丁貴人彈曲項琵琶圗楊妃架雪衣女亂雙陸局圗風俗則有剡中溪谷村墟圗永嘉屋邑圗長安車馬人物圗堯民鼓腹圗以上畫圗雖不能盡見其實迹前人載之甚詳但愛其佳名聊取一二録之師傳名畫記云若不知師資傳授則未可議乎畫晉明帝師于王廙衛協師于曹不興顧愷之張墨荀朂師于衛協史道碩王微師于荀朂衛協戴逵師于范宣逵子勃勃弟顒師于父宋陸探微師于顧愷之探微子綏弘肅并師于父顧寶光袁倩師于陸倩子質師于父顧駿之師于張墨張則師于吳暕吳暕師于江僧寶劉胤祖師于晉明帝胤祖弟紹祖子璞並師于胤祖南齊姚曇度子釋惠覺師于父蘧道敏師于章繼伯道敏甥僧珍師于道敏沈標師于謝赫周曇研師於曹仲達毛惠逺師于顧惠遠梁袁昻師于謝張鄭張憎繇子善果儒童並師于父解倩師于聶松蘧道敏焦寶願師于張謝江僧寶師于袁陸及戴田僧亮師于董展曹仲逹師于袁隋鄭法士師於張法士弟法輪子德文並師於法士孫尚子師於顧陸張鄭陳善見師於楊鄭李雅師於張僧繇王仲舒師于孫尚子又云各有師資遞相倣效或自開户牗或未及或過之似類之間精粗有别田僧亮楊子華楊契丹鄭法士董伯仁展子虔孫子虔閻立德閻立本並祖述顧陸僧繇所言勝者以觸類皆能而就中有所偏勝
