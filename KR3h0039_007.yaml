front:
  text: 圗畫攷卷之七
  hash: sha256:cee1f77dd2d0b3f9a636ade1dfb7dec034f6194487bbc1715a05bdde13e306c3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0039_SBCK_007-1a}
body:
  text: 鑒藏辨謬名畫記云論衣服人物車輿土風年代各異南北有殊觀畫之宜􅏅乎詳審只如吴道子畫仲由便戴木劍閆令公畫昭君已著幃帽殊不知木劍創扵晉代幃帽興扵唐朝舉此凡例亦畫之一病也且如幅巾傳扵漢魏羃䍦𧺫自齊隋幞頭始扵周朝折上巾軍旅所服即令幞頭也用全幅皁向後幞髪俗謂之幞頭武帝建徳年間方裁為四脚也巾子創扵武徳胡服靴衫豈可輙施於古像衣冠組綬不宜長用扵今人芒屩非塞北所宜牛車豈嶺南所有詳辨古今之物商較土風之宜指事繪形可驗時代其或生長南方不見北朝人物習熟塞北不議江南山川逰處江東不知京洛之盛此則非繪畫之病詳辨南北之妙跡古今之名蹤然後可以識畫品價張彦逺云夫失扵自然而後神失扵神而後妙失扵妙而後精精之為病也恐有缺大而成謹細自然者為上品之上神者為上品之古妙者為上品之下精者為中品之上謹而細者為中品之下今立此五等以包六法以貫衆妙其間詮量可有數百等孰能周盡非夫神邁識髙情逸心慧者豈可議乎畫云徧觀諸畫惟顧生畫古賢得其妙理對之令人終日不倦凝神遐想妙合自然物我兩忘離形去智身固可使如槁木心固可使如死灰不亦臻於妙理哉所謂畫之道也又云昔張懐瓘作書估論曰書畫道殊不可渾詰書即約字以言價畫則無涯以定名況漢魏三國名蹤已絶扵代今人貴耳賤目罕能詳鑒若傳授不昧其物猶存則爲國家之重寳晉之顧宋之陸梁之張首尾完全爲希世珍皆不可論價如其偶獲方寸便可椷持比之書價則顧陸可同鍾張僧繇可同逸少書則逡巡可成畫非歳月可就所以書多扵畫自古而然今分爲三古以定貴賤以漢魏三國為上古則趙𡵨劉褎蔡邕張衡巳上後漢人曹髦楊修桓範徐邈魏曹不興吴諸葛亮蜀之流是也以晉宋為中古則明帝荀朂衛恊王廙顧愷之謝稚嵇康戴逵陸探微顧寳光袁倩顧景秀之流是也以齊梁北齊後魏陳周為下古則姚曇度謝赫劉瑱毛恵逺齊元帝袁昻張僧繇江僧寳梁楊子華田僧亮劉殺鬼曹仲達北齊蔣少㳺楊乞徳後魏顧野王陳馮提伽後周之流是也隋及唐初為近代之價則董伯仁展子虔孫尚子鄭法士楊契丹陳善見隋張孝師范長壽尉遅乙僧王知慎閆立徳立本之流是也巳上唐上古質略徒有其名畫之蹤跡不可具見中古姸質相參世之所重如顧陸之跡人間切要下古評量料簡稍易辨觧跡渉今時之人所悦其間有中古可齊上古顧陸是也下古可齊中古僧繇子華是也近代之價可齊下古董展楊鄭是也唐畫可齊中古則尉遅乙僧吴道子閆立本是也若詮量次第有數百等今且舉世俗之所知而言凡人間藏蓄必當有顧陸張吴著名卷軸方可言有圗畫若書之九經三史顧陸張吴為正經楊鄭董展為三史其諸雜迹為百家吴質近可為正經必也手揣卷軸口定貴賤不惜泉貨要藏篋笥則董伯仁展子䖍鄭法士楊子華孫尚子閆立本吴道玄屏風一片值金二萬次者售一萬五千自隋巳前多畫屏風未知有畫幛故以屏風為準也其楊契丹田僧亮鄭法輪乙僧閆立徳一扇值金一萬且舉俗間諳悉者推此而言可見流品夫中品藝人有合作之時可齊上品藝人上品藝人當未遒之日偶落中品惟下品雖有合作不得厠扵上品在博通之人臨時鑒其姸醜如張顛以善草得名楷隸未必為人所寳余曽見小楷樂毅論虞褚之流韋鶠以畫馬得名人物未必為人所貴余見畫人物顧陸可儔夫大畫與細畫用筆有殊臻其妙者有數體如王右軍書自有數體及諸行草各繇臨時構思淺深耳此須廣見博論不可以槩而取昔裴孝源都不知畫妄定品第大不足觀但好之則貴扵金玉不好則賤扵瓦礫要之在人豈可言價印記古者御府圗畫晉宋至周皆未行印記惟列當時鑒知人押著自唐以來内府及諸家皆有印記詳載圗書攷第八卷南唐李後主雅好圗書精扵賞鑒有印篆曰内殿圗書内合同印建業文房之寳内司文印集賢殿書院印集賢御書印此印多用墨或親題畫人名姓或有押字米芾家上品書畫用姓名字印審定真跡字印神品字印平生真賞印米芾秘篋印寳晉書印米姓翰墨印鑒定法書之印米姓秘玩之印玉印六枚辛夘米芾之印米芾氏印米芾印米芾元章印米芾氏以上六印白字有此印印者皆絶品玉印惟著扵書帖其他字印杖雖參用於上品自畫古賢惟用玉印近代書多有宣和七印明七印皆經内府收往往售者作偽不可為信装背名畫記云自晉代以前装背不佳宋時范曄始能装背武帝時徐爰明帝時虞龢巢尚之徐希秀孫奉伯編次圗畫装背為妙梁武帝命朱异徐僧權唐懐充姚懐珍沈熾文等又加裝䕶國朝太宗皇帝使典儀王行真等装禠𧺫居郎禇遂良校書郎王知敬等監領凡圗書本是首尾完全著名之物不􅏅輙議改移之限若要錯綜次第或三帋五帋三扇五扇又上中下等相揉雜本無銓次者必宜與好處為首下者次之中者最後凡人觀畫必鋭扵開卷懈怠将半次遇中品不覺留連以至卷終此虞龢論装書畫之例扵理甚暢凡煮糊必去筯稀緩得所攪之不停自然調熟入少細硏薰陸香末永去蠹而牢固或入少蠟要在宻潤侯隂陽之氣以調適秋為上時春為中時夏為下時暑濕之時不可用勿以熟紙背必皺𧺫宜用白滑漫薄大幅生紙縫先避人面及要節處若縫縫相當則强急卷舒有損要令參差其縫則氣力均平太硬則强急太薄則失力絹素綵色不可搗理紙上白畫可以砧石妥貼之宜造一太平桉漆板朱界制其曲直古畫必有積年塵垢須用皂莢清水數宿漬之平案扞去塵垢畫復鮮明色亦不落補綴擡策油絹襯之直其邊際宻其隟縫端其經緯就其形制拾其遺脱厚薄均調潤潔平穩然後乃以鏤沈檀爲軸首或裹鼊束金爲飾白檀身為上香潔去虫小軸白玊為上水精為次琥珀為下大軸杉木漆頭輕圎最妙前代多用雜寳為飾易為剝壊故貞觀開元中内府圗書一例為白檀身紫檀首紫羅褾織成帶古之異錦具李章武所集錦譜文彦博以古畫背作匣意在寳惜然貼絹背著綳損愈疾今人屏風一二年即裂斷書畫以時卷舒近人手頻自不壊嵗久不開凡古畫不脱不須背藏玩張彦遠云夫金出扵山珠産扵泉取之不匕為天下用圗畫嵗久耗散將盡名人藝士不復更生可不惜哉夫人不善寳玩者動見勞辱卷舒失所者操揉便損不解装褫者随手弃捐遂使真跡漸少不亦痛乎非好事者不可妄傳書畫近火燭不可觀當風日正飡飲唾涕不洗手並不可觀昔桓玄愛重圗畫每示賔客客有非好事者正飡寒具油麵餅也以手捉畫畫大㸃汚玄惋惜移時自後每出法書輙令洗手人家要置一平安床褥拂拭舒展觀之大卷軸宜造架觀則懸之凡書畫時時舒展即免蠧濕
