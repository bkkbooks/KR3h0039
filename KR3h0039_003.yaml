front:
  text: 圗畫考卷之三
  hash: sha256:5417ba3c190714004192b0f3273f45debe270338e636abca70f1cc3d6156eb8f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0039_SBCK_003-1a}
body:
  text: 紀藝佛道北齊曹仲達者本曹國人最推工畫梵像是為曹吳謂唐吳道子也吳之筆其勢圜轉而衣服飄舉曹之筆其體稠疊而衣服緊窄故後輩曰吳帶當風曹衣出水又按蜀僧仁顯廣畫新集言曹曰昔笁乾康僧會者初入吳設像行道時曹不興見西國佛畫儀範寫之故天下盛傳曹也又云吳者起于宋之吳暕之作故號吳也且謝赫云不興之迹代不復見惟祕閣一龍頭而已觀其風骨擅名不虛吳暕之説聲微迹曖世不復傳至如仲達見北齊之朝距唐不逺道子顯開元之後繪像仍存證近代之師承合當時之體範况唐室以上未立曹吳豈顯釋寡要之談亂愛賔不刋之論推時驗迹無愧斯言也雕塑鑄像亦本曹吳人物見聞志云畫人物者必分貴賤氣貌朝代衣冠釋門則有善巧方便之顔道像必具修真度世之範帝皇當崇上聖天日之表外夷應得慕華欽順之情儒賢即見忠信禮義之風武士固多勇悍英烈之貌隱逸俄識肥遁髙世之節貴戚蓋尚紛華侈靡之容帝釋須明威福嚴重之儀鬼神乃作醜䰩馳趡之狀士女宜賦秀色婑媠之態田家自有醇氓朴野之真恭驁愈慘又在其間矣畫衣紋林石用筆全類于書畫衣紋有重大而條暢者有縝細而徑健者勾綽縱掣理無妄下以狀髙側深斜卷摺飄舉之勢宣和譜云周昉婦女多為豐厚態度意穠態遠又云李伯時工人物能分别狀貌使人望而知其廊館臺閣山林草野閭閻臧獲臺輿皂隸至于動作態度屈伸俯仰小大美惡與夫東西南北人才分點畫尊卑貴賤咸有區别非若世俗畫工渾為一律貴賤姸醜止以肥紅瘦黑分之大抵以立意為先緣􅎖次之也傳真即子儀寫壻真事能寫正面容者惟牟谷衣冠自古衣冠之制荐有變更指事繪形必分時代衮冕法服三禮備存物狀實繁難可得而載也漢魏以前始戴幅巾晉宋之世方用羃㒿後周以三尺皂絹向後幞髮名折上巾通謂之幞頭武帝裁成四腳隋朝惟貴臣服進德至則天朝以絲葛為幞頭巾子以賜百官開元間始易以羅又别賜供奉官及內官員郎宫樣巾子至唐末方用漆紗裹之乃今幞頭也三代之際皆衣襴衫秦始皇時以紫緋緑袍為三等品服庶人以白國語云𫀆者朝也古公卿上服也至周武帝時下加襴唐髙宗朝給五品以上隨身魚又敕品官紫服金玉帶深淺緋服並金帶深淺緑服並銀帶庶人服黃銅鐵帶一品以下文官帶手巾算袋刀子礪石武官亦然睿宗朝制武官五品以上帶七事跕蹀佩刀刀子磨石契苾真􅎪厥針筒大石袋也開元初復罷之晉處士馮翼衣布大袖周緣以皂下加襴前繫二長帶隨唐朝野服之謂之馮翼之衣今呼為直裰禮記孔子衣逢掖之衣又梁志有袴褶以從戎事三代以前人皆跣足三代以後始服木屐伊尹以草為之名曰履秦時用絲革靴本胡服趙靈王好之制有司衣袍者宜穿皂靴唐代宗令宫人侍左右者穿紅錦靿靴凡在經營所冥詳辨米芾云蜀范瓊畫梁武帝白冠衣褐晉尚白宋齊梁陳習見不同各以所尚色皆白帽顧愷之畫維摩猶白首周木德冕皆尚青仲尼曰吾殷人也生于宋故服章甫之冠此殷制殷水德故尚玄玄端章甫皆黑色也封二王後各行其正朔服其文物也漢火德用赤幘舜土德尚黃故服黃冠宜觸類而長之乃不凡唐人軟裹蓋禮樂闕則士習賤服以不違俗為美余初惑之耆舊言唐𥘉士子皆頂鹿皮冠辨遺制也更無頭巾掠子必帶箆所以裹帽則必用箆子約髮入幞頭巾子中其後有絲絹作掠子掠起髮頂帽出入不敢使尊者見又其後方用紫羅為無頂頭巾謂之額子猶不敢習庶人頭巾其後舉人始以紫紗羅為長頂頭巾稍作幅巾逍遙巾額子則為不敬衣用裹肚勒帛則為是近又以半臂軍服披甲上不帶者謂之背子以為重禮無則為無禮不知今之士服大帶拖紳乃為禮不帶左袵皆夷服漢制從者巾與殷母追同今頭巾若不作頂而四帶兩小者在髮而差大者垂則此制也徐州之民去巾下必有鹿楮皮冠此古俗所著良足美也又唐初畫舉人必鹿皮冠縫掖大袖黃衣短至膝長白裳也蕭翼御史至越見辨才云著黃衣大袖如山東舉子用證未軟裹曰襴也李太白像鹿皮冠大袖黃袍服亦奇制也宫室張彥逺云吳道子畫植柱構梁不假界筆直尺郭若虛云畫屋木者折算無虧筆畫勻壯深逺透空一去百斜如隋唐五代以前洎郭忠恕王士元之流畫樓閣多見四角其斗栱逐鋪作為之向背分明不失繩墨今之畫者多用直尺一就界畫分成斗栱筆迹繁雜無壯麗間雅之意又云設或有未識漢殿吳殿梁柱斗栱義手替木熟柱駝峯方莖額道抱間昻頭琥珀枋龜頭虎坐飛簷撲水膞風化廢垂魚惹草當鈎曲脊之類憑何以畫屋木也畫者尚未能精究況觀者乎
