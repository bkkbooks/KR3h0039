front:
  text: 圗畫考卷之五
  hash: sha256:7f14102add23965915db487c0bdffe48cd17f3f1e0c6662417aef31855d3252b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0039_SBCK_005-1a}
body:
  text: 紀藝竹木訣云近世喜畫枯木及竹然枯木須作霜髙脫葉之狀不可作枯死木也竹須是作竹葉今往往似栁葉米芾云唐人作著色竹比他竹大粗也唐有蕭悅畫竹深得竹之生意郭熙云學畫竹者取一枝竹月夜照其影於素壁上則竹之形出矣蘇子瞻作墨竹從地一直起至頂余問何不逐節分曰竹生時何嘗逐節生運思清拔出於文同與可自謂與文拈一瓣香以墨深為面淡為背自與可始也作成林竹尤精子瞻作枯木枝幹虬屈無端石皺硬亦怪怪奇奇如其胸中􅌉鬱也花鳥見聞志云花果草木自有四時景候隂陽向背笋條老嫩苞萼後先又云黃家富貴徐熙野逸不惟各志有異蓋亦耳目所習得之于心而應之于手也何故知其然黃筌父子給事內宫多寫禁籞珍禽瑞鳥奇花怪石今世傳桃花鷹鶻純白雉兔金盆鵓鴿孔雀龜鶴之類是也又翎毛骨氣尚豐滿而天水分色徐熙江南處士志節髙邁放達不羈多狀江湖所有汀花野草水鳥囦魚今世傳鳬雁鷺鷥蒲藻蝦魚叢艷折枝園蔬藥苗之類是也又翎毛骨貴輕秀而天水通色大抵江南之藝骨氣多不及蜀人而瀟灑過之二者春蘭秋菊各擅重名下筆成珍揮毫可範復有居寀兄居寶徐熙之孫曰崇嗣曰崇矩蜀有刁處士光胤劉贊滕昌祐夏侯延祐李懷衮江南有唐希雅希雅之孫曰中祚曰宿及解處中輩都下有李符李吉之等及後來名手間出企望徐生與二黃繇山水之有正經黃筌之師曰刁處士關同之師荆浩也畫翎毛者必須知識諸禽形體名件自嘴喙口蔬果草蟲附宣和畫譜云蔬果于寫生最為難工論者以謂郊外之蔬易工于水濵之蔬水濵之蔬又易工于園畦之蔬墜地之果易工于折枝之果折枝之果又易工于林間之果若草蟲者凡見諸詩人之比興陳有顧野王五代有唐垓宋有郭元方釋居寧龍魚見聞志云畫龍者析出三停分成九似自首至膊膊至腰腰至尾為三停鹿角駝頭鬼眼蜃腹蛇項魚鱗鷹爪虎掌牛耳謂之九似也窮遊泳蜿蜒之妙得蟠回升降之宜仍要騣鬛肘毛筆畫壯快直自肉中生出為佳也畫魚者多作庖中几上物乏乘風破浪之勢五代袁嶬以魚蟹馳譽若崔白徐皋輩無涵泳噞喁之態使人但垂涎耳劉寀畫魚深得戲廣浮深相忘於江湖之意蓋畫者以鬐鱗刺分明則非水中矣安得有涵泳自然之勢若在水中則無由顯露畜獸郭若虛云畫畜獸者全要停分向背筋力精神肉分肥圎毛骨隱起仍分諸物所稟動止之性四足惟兔掌底有毛謂之建毛晉武帝得八駿圗穆王時畫黃素上為之腐敗而骨氣宛在歷代以為國寶貞觀中傳模于世一曰渠黃二曰山子三曰盜驪四曰緑耳五曰赤驥六曰驑七曰踰輪八曰白􅠋唐開元天寶世尚輕肥三花飾馬剪鬃為三辮韓幹畫三花御馬張萱畫虢國出行圗亦有三花馬畫譜云畫史狀牛馬而得名者為多至虎豹鹿豕獐兔取其原野荒寒跳梁奔逸不羈之狀以寄筆間豪邁之氣若乃犬羊貓狸又其近人之物最為難工花間竹外舞裀繡幄得其不為搖尾乞憐之態馬則晉有史道碩唐有韓幹曹霸牛則唐有戴嵩與其弟戴嶧五代及宋有朱羲輩犬則唐有趙博文五代有張及之宋有趙令松羊則五代有羅塞翁虎則唐有李漸宋有趙邈齡貓則五代有李靄之宋有王凝何尊師又云士人多善畫馬者以馬之取譬駑驥遲疾隱顯遇否如士之遊世胡瓌用畫駝馬鬃尾人衣毛毳以狼毫縛筆疏渲之取其纎健也
