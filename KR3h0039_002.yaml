front:
  text: 圗畫攷卷之二
  hash: sha256:1c86fbf5a3ebdb2511d9687045bce6ec86c7539d89573117e88e314c9eec0ae7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0039_SBCK_002-1a}
body:
  text: 工用筆法名畫記云顧愷之之跡緊劲聨綿循環超忽調格逸易風趨電疾意存筆先畫盡意在所以全神氣也晋張芝草書一筆而成氣脉通連隔行不斷惟王子敬深明其旨故謂之一筆書其後陸探微亦作一筆畫連綿不斷精利潤媚新奇妙絶名髙宋代時無等倫張僧繇黙曳斫拂依衛夫人茟陣圗一㸃一畫别是一巧鈎㦸利劍森森然吳道玄古今獨歩前不見顧陸後不見來者授筆法扵張旭故知書畫用筆同矣張號書顛吴為畫聖神假天造英靈不窮衆皆宻扵盼際我則離披其㸃畫衆皆謹於象佀我則脱落其凡俗彎弧挺刃植柱構梁不假界筆直尺虬鬚雲鬢數尺飛動毛根出肉力健有餘當有口訣人莫得知數仭之畫或自臂𧺫或從足先巨壯詭恠膚脉連結過於僧繇矣吴曹筆法見佛道内顧陸之神不可見其盼際所謂筆迹周宻也張吴妙筆纔一二像已應焉離披㸃畫時見缺落此雖筆不周而意周也若知畫有疎宻二體方可議畫見聞志云凡畫氣韻本乎逰心神采生於用筆用筆之難斷可識矣陸探微能一筆畫者乃是自始及終筆有朝揖連綿相屬氣脉不斷所以意存筆先筆周意内畫盡意在像應神全夫内自足然後神閒意定神閒意定則思不竭而筆不困也昔宋元君将畫圗衆史皆至受揖而立紙筆和墨外者半有一史後至者儃儃然不趨受揖不立因之舍公使人視之則解衣􅌉礴君曰可矣是真畫者也又畫有三病皆繫扵用筆一曰版二曰刻三曰結版者腕弱筆癡全虧取與物状平褊不能圜渾也刻者運筆中疑心手相戾勾畫之際妄生圭角也結者欲行不行當散不散似物凝碍不能流暢也大抵氣韻髙茟畫壯財愈玩愈姸其或格凡毫懦初觀縱可采久之還復意怠矣米元章云王防字元䂓家二天王皆吳之入神畫行筆磊落揮霍如蓴菜條圎潤折算方圎凹凸装色如新又云江南周文矩士女面一如昉衣紋作戰筆此蓋布文也周昉筆秀潤匀細郭熙云筆跡不渾成謂之疎疎則無真意墨色不滋潤謂之枯枯則無生意氣韻謝赫云畫有六法一曰氣韻生動云云詳見前張彦遠云古之畫或遺其形似而尚其骨氣以形似之外求其畫此難可與俗人道也今之畫縱得其形佀而氣韻不生以氣韻求其畫則形似在其間矣上古之畫跡簡意淡而雅正顧陸之流是也近代之畫煥爛而求備今人之畫錯亂而無旨衆工之迹是也夫象物必在扵形佀形似須全其骨氣骨氣形似皆本扵立意而歸乎用筆故工畫者多善書然則古之嬪擘纖而胷束古之馬喙尖而腹細古之䑓閣竦峙古之服􅎖容曳故古畫非獨變態有奇意也抑亦物象殊也至扵䑓閣樹石車輿噐物無生動之可擬無氣韻之可侔直要位置向背而已顧愷之曰畫人最難次山水次狗馬其䑓閣一定器耳差易為也斯言得之至扵鬼神人物有生動之可狀須神韻而後全若氣韻不周空陳形似筆力未遒空善賦彩謂非妙也故韓子曰狗馬難鬼神易狗馬乃凡俗所見鬼神乃詭恠之狀斯言得之至扵經營位置則畫之總要自顧陸以降畫跡鮮存難悉詳之唯觀吳道玄之跡可謂六法俱全萬象畢盡神人假手窮極造化所以氣韻雄壯㡬不容扵縑素筆跡磊落遂恣意扵牆壁其細畫又甚稠宻此神異也設色名畫記云夫隂陽陶烝萬象錯布玄化無言神工獨運草木敷榮不待丹碌之采雲雪飃颺不待鉛粉而白山不待空青而翠鳳不待五色而綷是故運墨而五色具謂之得意意在五色則物象乖矣夫畫物特忌形貌采章歴歴俱足甚謹甚細而外露巧宻所以不患不巧而患扵巧既知其巧亦何必巧此非不巧也若不識其巧是真不巧也夫工欲善其事必先利其器齊紈吳綀氷素霧綃精潤宻緻機杼之妙也武陵水井之丹磨嵳之沙越嶲之空青蔚之曽青武昌之扁青上品石緑蜀郡之鉛華黄丹南海之蟻􅑭赤膠也造粉胭脂吴中之鰾膠東阿之牛膠采章之用也漆姑汁練煎並為重采欝而用之古畫並用漆姑汁若煉煎謂之欝色扵緑色上重用之模搨顧愷之有模搨妙法宣紙用法䗶之以備摹搨好畫古者模法十得七八不失神采筆蹤亦有御府搨本謂之官搨唐内庫翰林集賢秘閣搨冩不輟承平之際此道甚行有非常好本搨得之者所宜寳之既可希其真蹤又得留為証驗傳搨模寫乃畫家末事然今人麁善寫見得其
