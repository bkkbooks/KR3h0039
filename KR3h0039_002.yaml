front:
  text: 圗畫考卷之二
  hash: sha256:036a83daa83ff0df85e3fc472a532a14edf2bbc8b9b904c48106cca5ac018872
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0039_SBCK_002-1a}
body:
  text: 工用筆法名畫記云顧愷之之跡緊勁聨綿循環超忽調格逸易風趨電疾意存筆先畫盡意在所以全神氣也晋張芝草書一筆而成氣脉通連隔行不斷惟王子敬深明其旨故謂之一筆書其後陸探微亦作一筆畫連綿不斷精利潤媚新奇妙絶名髙宋代時無等倫張僧繇默曳斫拂依衛夫人茟陳圗一㸃一畫别是一巧鈎㦸利劍森森然吳道玄古今獨步前不見顧陸後不見來者授筆法于張旭故知書畫用筆同矣張號書顛吳為畫聖神假天造英靈不窮衆皆密于盼際我則離披其㸃畫衆皆謹於象似我則脫落其凡俗彎弧挺刃植柱構梁不假界筆直尺虬鬚雲鬢數尺飛動毛根出肉力健有餘當有口訣人莫得知數仭之畫或自臂起或從足先巨壯詭怪膚脉連結過於僧繇矣吳曹筆法見佛道內顧陸之神不可見其盼際所謂筆迹周密也張吳妙筆才一二像已應焉離披㸃畫時見缺落此雖筆不周而意周也若知畫有疏密二體方可議畫見聞志云凡畫氣韻本乎逰心神采生於用筆用筆之難斷可識矣陸探微能一筆畫者乃是自始及終筆有朝揖連綿相屬氣脉不斷所以意存筆先筆周意內畫盡意在像應神全夫內自足然後神閒意定神閒意定則思不竭而筆不困也昔宋元君將畫圗衆史皆至受揖而立紙筆和墨外者半有一史後至者儃儃然不趨受揖不立因之舍公使人視之則解衣􅌉礴君曰可矣是真畫者也又畫有三病皆繫于用筆一曰版二曰刻三曰結版者腕弱筆癡全虧取與物狀平褊不能圜渾也刻者運筆中疑心手相戾勾畫之際妄生圭角也結者欲行不行當散不散似物凝礙不能流暢也大抵氣韻髙茟畫壯財愈玩愈姸其或格凡毫懦初觀縱可采久之還復意怠矣米元章云王防字元規家二天王皆吳之入神畫行筆磊落揮霍如蓴菜條圎潤折算方圎凹凸裝色如新又云江南周文矩士女面一如昉衣紋作戰筆此蓋布文也周昉筆秀潤勻細郭熙云筆跡不渾成謂之疏疏則無真意墨色不滋潤謂之枯枯則無生意氣韻謝赫云畫有六法一曰氣韻生動云云詳見前張彥遠云古之畫或遺其形似而尚其骨氣以形似之外求其畫此難可與俗人道也今之畫縱得其形似而氣韻不生以氣韻求其畫則形似在其間矣上古之畫跡簡意淡而雅正顧陸之流是也近代之畫煥爛而求備今人之畫錯亂而無旨衆工之迹是也夫象物必在于形似形似須全其骨氣骨氣形似皆本于立意而歸乎用筆故工畫者多善書然則古之嬪擘纖而胸束古之馬喙尖而腹細古之臺閣竦峙古之服􅎖容曳故古畫非獨變態有奇意也抑亦物象殊也至于臺閣樹石車輿器物無生動之可擬無氣韻之可侔直要位置向背而已顧愷之曰畫人最難次山水次狗馬其臺閣一定器耳差易為也斯言得之至于鬼神人物有生動之可狀須神韻而後全若氣韻不周空陳形似筆力未遒空善賦彩謂非妙也故韓子曰狗馬難鬼神易狗馬乃凡俗所見鬼神乃詭怪之狀斯言得之至于經營位置則畫之總要自顧陸以降畫跡鮮存難悉詳之唯觀吳道玄之跡可謂六法俱全萬象畢盡神人假手窮極造化所以氣韻雄壯幾不容于縑素筆跡磊落遂恣意于牆壁其細畫又甚稠密此神異也設色名畫記云夫隂陽陶蒸萬象錯布玄化無言神工獨運草木敷榮不待丹碌之采雲雪飄揚不待鉛粉而白山不待空青而翠鳳不待五色而綷是故運墨而五色具謂之得意意在五色則物象乖矣夫畫物特忌形貌采章歷歷俱足甚謹甚細而外露巧密所以不患不巧而患于巧既知其巧亦何必巧此非不巧也若不識其巧是真不巧也夫工欲善其事必先利其器齊紈吳綀氷素霧綃精潤密緻機杼之妙也武陵水井之丹磨嵳之沙越嶲之空青蔚之曽青武昌之扁青上品石緑蜀郡之鉛華黃丹南海之蟻􅑭赤膠也造粉胭脂吳中之鰾膠東阿之牛膠采章之用也漆姑汁練煎並為重采鬱而用之古畫並用漆姑汁若煉煎謂之鬱色于緑色上重用之模搨顧愷之有模搨妙法宣紙用法䗶之以備摹搨好畫古者模法十得七八不失神采筆蹤亦有御府搨本謂之官搨唐內庫翰林集賢祕閣搨寫不輟承平之際此道甚行有非常好本搨得之者所宜寶之既可希其真蹤又得留為證驗傳搨模寫乃畫家末事然今人麁善寫見得其
