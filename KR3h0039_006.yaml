front:
  text: 圗畫考卷之六
  hash: sha256:eb10f7f6e38f978f78142f35f1fa4c90ac53598d4fd830a15069646d96716a0f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0039_SBCK_006-1a}
body:
  text: 名譜上古軒轅史皇周封膜齊敬君秦烈裔前漢毛延壽陳敞鎦白龔寬陽望樊育後漢趙𡵨劉褒蔡雍張衡劉旦楊魯魏曹髦楊修桓範徐邈吳曹不興吳王趙夫人蜀諸葛亮子瞻中古晉明帝荀朂張墨衛協王廙王羲之王獻之謝稚夏侯瞻嵇康溫嶠謝岩曹龍丁逺楊惠江思逺康昕顧愷之史道碩王𪷟戴逵子顒宋陸探微二子綏弘肅顧寶光宗炳王微謝莊史敬文史藝劉斌尹長生顧駿之袁倩康允之顧景秀吳暕張則劉胤祖弟紹祖子璞蔡斌濮万年濮道興史粲朱僧辨禇靈石范惟賢南齊宗測劉係宗姚曇度子釋惠覺蘧道敏甥沙門僧珍章繼伯范懷珍鍾宗之王奴王殿戴蜀陳公恩江僧寶僧威公僧吉底俱僧摩羅菩提僧迦佛他陳顧野王後魏蔣少遊郭善明侯文和栁儉閔文和郭道興楊乞德王由祖班北齊髙孝珩蕭放楊子華田僧亮劉殺鬼曹仲達殷英童髙尚士徐德祖曹仲璞後周馮提伽隋閻毗何稠劉龍弟衮展子虔鄭法士弟法輪孫尚子董伯仁楊契丹劉烏陳善見江志李雅王仲舒閻思光解悰程瓚尉遲跋質那僧曇摩拙義唐漢王元昌弟韓王元嘉滕王元嬰閻立本兄立德張孝思范長壽何長壽尉遲乙僧劉孝思靳智翼王定梁寬吳智敏康薩陀王智慎王韶應檀智敏楊須跋趙武端范龍樹周烏孫楊德紹陳義殷􅯺殷季友許琨僧法明錢國養左文通王陀子牛昭吳道子張愛兒楊惠之員明程進韓伯通竇弘果毛婆羅孫仁貴金忠義翟琰李生張藏楊庭光盧稜伽姚景仙武靜藏董崿陳靜心弟靜眼程雅楊坦子爽楊仙喬馮紹正薑皎李思訓李思誨子林甫李昭道子湊薛稷郎餘令曹元廓劉行臣暢辨子明瑾楊升張萱尹琳李仲昌李嗣真韋無忝弟無蹤朱抱一竺元標蔡金剛毛嵩姚彥山程遜董好子楊樹兒耿純任貞亮陸廷曜暢整李相國陳慤劉智敏史晟何君墨京元成崔霞冷元琇馬光業李蠻子馬樹鷹祝丘周子敬段去惑僧智瑰潘細衣殷令名殷聞禮子仲容談皎張遵禮王紹宗宋令文盧鴻僧金剛三藏司馬丞禎僧翛然鄭虔鄭逾李果奴子士昉曹霸韓幹孔榮陳閎孟仲暉杜景祥王允之王維張諲劉方平王熊王象田琦竇師綸江都王緒李逖李平鈞崔陽元吳俊李炅張惟亘李滔張通周古言耿昌言弟昌期嚴杲楊德本李韶魏晉孫蒯亷白旻韓嶷子文肅陳庭髙江車道政滕王湛然齊皎弟映朱審王宰畢宏楊炎史瓉裴諝韋鑒弟鑾子鶠張璪陳曇顧況沈寧劉商劉整劉之奇邊鸞于錫強穎梁廣陳庶陳恪子積善戴重席劉之章周昉趙博宣弟博文王朏鄭寓韓滉戴嵩弟嶧李漸子仲和蕭祐周太素麴庭蕭悅張志和僧道芬鄭町侯莫陳夏梁洽項容吳恬王默以下唐末人左全趙公祐趙溫其趙德齊范瓊陳皓彭堅常粲常重胤吕嶤竹虔孫遇張詢張南本麻居禮張素卿陳若愚胡瓌子虔荆浩刁光胤尹繼昭李洪度辛澄張騰張贊于兢趙嵓劉彥齊袁嶬羅塞翁東丹王胡翼王殷李群燕筠杜霄李玄應厲歸真李靄之韋道豐朱簡章王喬士鄭唐卿關同支仲元枝行思郭乾暉鍾隱郭權史瓊程凝王道古李坡唐垓王道求宋卓富玫左禮張南王偉黃延浩張質韓求李祝張圗朱繇李升杜楷杜子瓌杜洪義房從真宋藝髙道興阮知晦杜齯龜蒲延昌黃筌髙從遇阮惟德杜敬安黃居寶趙元德趙忠義蒲師訓張玫徐德昌周行通張玄孔嵩丘文播丘文曉趙才滕昌祐薑道隱楊元真董從晦張景思跋異王仁壽衛賢朱悰曹仲玄陶守立竹夢松何遇陸晃施璘貫休楚安傳古弟子嶽闍黎智藴德符近古燕恭肅王嘉王李後主武宗元劉永年郭忠恕王士元宋道弟迪文同郭元方董源右皆王公士大夫也李成宋澥右二人髙尚之士也下皆業繪畫名王靄髙益王瓘孫夢卿趙光輔趙隱士孫知微勾龍爽李文才石恪袁仁厚趙長元周文矩顧德謙郝處厲昭慶顧洪祝李雄侯翼髙文進王道真李用及李象坤髙懷節張昉髙元亨楊朏王兼濟孫懷悅陳用智孟顯陳士元王拙王居正葉進成葉仁遇郝澄童仁益毛文昌南簡龍章子囦武洞淸江惟情鍾文秀田景李元濟王易陳坦令宗李八師劉道士右五十三人畫人物并傳寫牟谷髙太沖尹質歐陽黌文廣元靄維真何充右獨工傳畫精妙范寬劉永王端翟院深燕貴許道寧紀真黃懷玉商訓丘訥龎崇穆李隱髙克明屈鼎郝鋭梁忠信李宗成郭熙董贇侯封符道隱擇仁巨然繼肇以上工山水黃居寀劉贊丘餘慶夏侯延祐髙懷寶徐熙徐崇矩徐崇嗣唐希雅唐宿唐忠祚解處中祁序陶裔毋咸之李符傅文用劉夢松劉文惠李懷衮王曉趙昌王友鐔宏易元吉崔白崔慤艾宣李吉侯文慶董祥葛守昌李祐丁貺閻士安居寧慧崇何尊師牛戩以上工花鳥卑顯張戡丘士元裴文晛胡九齡馮清包貴包鼎趙邈齡辛成馮進成吳進吳懷董羽任從一趙幹曹仁熙荀信戚文秀路衙推楊揮朱澄徐易徐白劉文通蔡潤蒲永升何霸張經支選藴能吕拙趙裔鄧隱以上工雜畫
